# Captured (REDACTED) Argo CD declarative cluster Secret.
#
# Source of record for the cluster-from-Secret primitive (D6): the parser and its
# test are derived from THIS real nested shape, not from the implementation's own
# assumption (Accepted Risk "Argo Secret format without a working mirror"). It
# mirrors what `argocd cluster add` writes and what Argo CD's declarative-setup
# docs document for a cluster Secret.
#
# ALL SECRET MATERIAL IS REDACTED. The bearerToken below is a dummy, and the
# caData / certData / keyData inside `config` are base64 of placeholder PEM, not
# real keys. They are kept base64-decodable so a test can round-trip them.
#
# Shape notes (the load-bearing part the parser handles):
#   - Top-level `name` and `server` identify the cluster.
#   - `config` is a JSON BLOB (a string), NOT nested YAML. Inside it:
#       * `bearerToken`                      -- the service-account token (auth)
#       * `tlsClientConfig.insecure`         -- skip server cert verification
#       * `tlsClientConfig.caData`           -- base64 PEM of the cluster CA
#       * `tlsClientConfig.certData`         -- base64 PEM of a client cert (mTLS)
#       * `tlsClientConfig.keyData`          -- base64 PEM of the client key (mTLS)
#       * `execProviderConfig`               -- optional exec credential plugin
#     caData/certData/keyData are base64 INSIDE the JSON, so they are decoded
#     twice on the wire: once by the Secret API (stringData -> data), once by the
#     parser out of the JSON string.
#   - The label `argocd.argoproj.io/secret-type: cluster` is how the source
#     selects these Secrets (it lists with this label selector).
#
# This file uses `stringData` (the readable authoring form). The Kubernetes Secret
# API base64-encodes stringData into `data` on write and the client returns it
# already base64-DECODED in Secret.Data (raw bytes) -- which is exactly the
# map[string][]byte the parser consumes.
apiVersion: v1
kind: Secret
metadata:
  name: cluster-prod-example
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
type: Opaque
stringData:
  name: prod-example
  server: https://prod.example.com:6443
  config: |
    {
      "bearerToken": "REDACTED-SERVICE-ACCOUNT-TOKEN",
      "tlsClientConfig": {
        "insecure": false,
        "caData": "LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tClJFREFDVEVELUNMVVNURVItQ0EKLS0tLS1FTkQgQ0VSVElGSUNBVEUtLS0tLQo=",
        "certData": "LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tClJFREFDVEVELUNMSUVOVC1DRVJUCi0tLS0tRU5EIENFUlRJRklDQVRFLS0tLS0K",
        "keyData": "LS0tLS1CRUdJTiBSU0EgUFJJVkFURSBLRVktLS0tLQpSRURBQ1RFRC1DTElFTlQtS0VZCi0tLS0tRU5EIFJTQSBQUklWQVRFIEtFWS0tLS0tCg=="
      }
    }
---
# A SECOND realistic variant: an EKS-style cluster using an exec credential plugin
# instead of a stored bearer token. Argo stores the plugin invocation under
# `execProviderConfig`; readout maps it onto AuthInfo.Exec (the binary must be on
# PATH in readout's image -- Accepted Risk "Exec binary not shipped"). caData is
# still present for TLS trust. ALL VALUES REDACTED / placeholder.
apiVersion: v1
kind: Secret
metadata:
  name: cluster-eks-example
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
type: Opaque
stringData:
  name: eks-example
  server: https://REDACTED.gr7.us-east-1.eks.amazonaws.com
  config: |
    {
      "execProviderConfig": {
        "apiVersion": "client.authentication.k8s.io/v1beta1",
        "command": "aws",
        "args": ["--region", "us-east-1", "eks", "get-token", "--cluster-name", "eks-example"],
        "env": {
          "AWS_PROFILE": "REDACTED"
        }
      },
      "tlsClientConfig": {
        "insecure": false,
        "caData": "LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tClJFREFDVEVELUNMVVNURVItQ0EKLS0tLS1FTkQgQ0VSVElGSUNBVEUtLS0tLQo="
      }
    }
