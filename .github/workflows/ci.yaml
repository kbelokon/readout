name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache-dependency-path: go.sum
      - name: Install templ (pinned to go.mod)
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1020
      - name: Gate - templ output is fresh
        run: |
          templ generate
          git diff --exit-code
      - name: Gate - go vet
        run: go vet ./...
      - name: Gate - golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.2
          args: --timeout=5m
      - name: Gate - tests with race detector
        run: go test ./... -race
      - name: Gate - govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
