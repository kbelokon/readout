name: CI
on:
  push:
    branches: [main, frontend-refactor]
  pull_request:
permissions:
  contents: read
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"
          cache-dependency-path: go.sum
      - name: Install templ (pinned to go.mod)
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1020
      - name: Gate - templ output is fresh
        run: |
          templ generate
          git diff --exit-code
      - name: Gate - comment hygiene
        run: bash scripts/check-comments.sh
      - name: Gate - go vet
        run: go vet ./...
      - name: Gate - golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.11.2
          args: --timeout=5m
      - name: Gate - tests with race detector
        run: go test ./... -race
      - name: Gate - govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          govulncheck ./...

  # Behavioural e2e: host path on the native amd64 runner. The Playwright
  # browser plus its OS deps are installed directly (no container); `make e2e`
  # builds the readout binary and runs the desktop/mobile projects against the
  # fakeapi harness. Deliberately NOT a `make ci` gate (see Makefile).
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"
          cache-dependency-path: go.sum
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json
      - name: Install Playwright browser + OS deps (Chromium)
        working-directory: tests/e2e
        run: |
          npm ci --no-audit --no-fund
          npx playwright install --with-deps chromium
      - name: Gate - npm audit (e2e)
        working-directory: tests/e2e
        run: npm audit --audit-level=high
      - name: Run the behavioural e2e suite
        run: make e2e
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: failure()
        with:
          name: e2e-playwright-report
          path: |
            tests/e2e/playwright-report
            tests/e2e/test-results
          if-no-files-found: ignore

  # Frontend asset gate: lints + typechecks the src tree and proves the committed
  # static/ artifacts are fresh. Node 24 (matches package.json engines), npm cache
  # keyed off the root package-lock.json. Both typecheckers run (tsgo = TS7 native
  # preview, tsc = stable cross-check) until TS7 is stable. The node-test step is a
  # the find-guard keeps this step deterministic: it runs the suite when *.test.ts files exist (95 today) and no-ops cleanly if they are ever absent.
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install deps
        run: npm ci
      - name: Gate - npm audit (root)
        run: npm audit --audit-level=high
      - name: Gate - Biome lint/format
        run: npx biome check internal/assets/src scripts
      - name: Gate - typecheck (tsgo, TS7 native preview)
        run: npx tsgo --noEmit
      - name: Gate - typecheck (tsc, stable cross-check)
        run: npx tsc --noEmit
      - name: JS unit tests
        run: find internal/assets/src/js -name '*.test.ts' | grep -q . && node --test 'internal/assets/src/js/**/*.test.ts' || echo 'no JS tests yet — step skipped'
      - name: Gate - embedded assets are fresh
        run: |
          node scripts/build-assets.mjs
          git diff --exit-code -- internal/assets/static

  # Helm chart gate. Users run helm 3, so CI pins helm 3 (local dev runs helm 4;
  # both must pass). Validates: lint, default + every example render through
  # kubeconform -strict (core types from the upstream schema, the three CR kinds
  # from the schemas vendored in chart/ci/schemas/ -- never -ignore-missing-schemas),
  # then the template safety-gate and values.schema.json matrix as exit-code asserts.
  chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.21.0
      - name: Install kubeconform
        run: |
          curl -fsSL -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.8.0/kubeconform-linux-amd64.tar.gz
          # Published SHA256 from the v0.8.0 release CHECKSUMS file. Verify the
          # tarball BEFORE untar/install so no tampered binary enters the chain.
          echo "9bc2bffbf71f261128533edaf912153948b7ff238f9a531ae6d34466ec287883  kubeconform.tar.gz" | sha256sum -c -
          tar -xzf kubeconform.tar.gz kubeconform
          sudo install -m 0755 kubeconform /usr/local/bin/kubeconform
          kubeconform -v
      - name: Gate - helm lint
        run: helm lint chart
      - name: Gate - render + kubeconform (default + every example)
        run: bash scripts/chart-kubeconform.sh chart
      - name: Gate - safety gate + schema matrix
        run: bash scripts/chart-gate-matrix.sh chart
