name: release-chart
on:
  push:
    tags: ["chart-v*"]
permissions:
  contents: read
  packages: write
jobs:
  chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          # Package with the same helm major the CI chart job validates against
          # (users run helm 3), so packaging behavior cannot drift independently.
          version: v3.21.0
      - name: Registry login
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Guard - appVersion image exists
        run: |
          APP=$(grep '^appVersion:' chart/Chart.yaml | awk '{print $2}' | tr -d '"')
          test -n "$APP"
          docker manifest inspect "ghcr.io/kbelokon/readout:${APP}" > /dev/null
      - name: Package and push chart
        run: |
          VERSION="${GITHUB_REF_NAME#chart-v}"
          helm package chart --version "$VERSION"
          helm push "readout-${VERSION}.tgz" oci://ghcr.io/kbelokon/charts
