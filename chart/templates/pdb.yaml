{{- if .Values.podDisruptionBudget.enabled -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "readout.fullname" . }}
  labels:
    {{- include "readout.labels" . | nindent 4 }}
  {{- $ann := include "readout.annotations" (dict "context" .) }}
  {{- with $ann }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  {{- /* Emit each field whenever it is set, including the valid value 0 --
     a plain `with` would treat 0 as empty and silently drop an explicit
     budget like maxUnavailable: 0 (block all voluntary evictions). */}}
  {{- $min := .Values.podDisruptionBudget.minAvailable }}
  {{- if not (or (kindIs "invalid" $min) (eq (toString $min) "")) }}
  minAvailable: {{ $min }}
  {{- end }}
  {{- $max := .Values.podDisruptionBudget.maxUnavailable }}
  {{- if not (or (kindIs "invalid" $max) (eq (toString $max) "")) }}
  maxUnavailable: {{ $max }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "readout.selectorLabels" . | nindent 6 }}
{{- end }}
