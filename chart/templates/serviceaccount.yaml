{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "readout.serviceAccountName" . }}
  labels:
    {{- include "readout.labels" . | nindent 4 }}
  {{- $ann := include "readout.annotations" (dict "context" . "local" .Values.serviceAccount.annotations) }}
  {{- with $ann }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
{{- end }}
