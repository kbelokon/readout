apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "readout.fullname" . }}
  labels:
    {{- include "readout.labels" . | nindent 4 }}
  {{- $ann := include "readout.annotations" (dict "context" .) }}
  {{- with $ann }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
data:
  readout.yaml: |
    {{- include "readout.config" . | nindent 4 }}
