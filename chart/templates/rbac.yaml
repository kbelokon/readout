apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "readout.fullname" . }}
  labels:
    {{- include "readout.labels" . | nindent 4 }}
  {{- $ann := include "readout.annotations" (dict "context" .) }}
  {{- with $ann }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
rules:
  - apiGroups: [""]
    resources: ["configmaps", "endpoints", "events", "limitranges", "namespaces", "nodes", "persistentvolumeclaims", "persistentvolumes", "pods", "pods/log", "replicationcontrollers", "resourcequotas", "services"]
    verbs: ["get", "list"]
  - apiGroups: ["apps", "batch", "autoscaling", "networking.k8s.io", "policy", "rbac.authorization.k8s.io", "storage.k8s.io", "apiextensions.k8s.io", "gateway.networking.k8s.io", "cert-manager.io", "metrics.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "readout.fullname" . }}
  labels:
    {{- include "readout.labels" . | nindent 4 }}
  {{- $ann := include "readout.annotations" (dict "context" .) }}
  {{- with $ann }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "readout.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "readout.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
