{{- if .Values.gateway.enabled -}}
{{- $fullName := include "readout.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
{{- if not .Values.gateway.parentRefs -}}
{{- fail "gateway.enabled requires at least one gateway.parentRefs entry; an HTTPRoute with no parentRefs is invalid and attaches to nothing" -}}
{{- end -}}
apiVersion: {{ .Values.gateway.apiVersion }}
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "readout.labels" . | nindent 4 }}
  {{- $ann := include "readout.annotations" (dict "context" . "local" .Values.gateway.annotations) }}
  {{- with $ann }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  {{- with .Values.gateway.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- if .Values.gateway.rules }}
    {{- toYaml .Values.gateway.rules | nindent 4 }}
    {{- else }}
    - backendRefs:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
    {{- end }}
{{- end }}
