image:
  repository: ghcr.io/kbelokon/readout
  # defaults to chart appVersion when empty
  tag: ""
  # when set, the digest wins and the tag is ignored
  digest: ""
  pullPolicy: IfNotPresent

# overrides for generated resource names
nameOverride: ""
fullnameOverride: ""

# Labels merged into the metadata.labels of every resource this chart renders.
# Applied last, so a key here overrides the standard chart label of the same name.
commonLabels: {}

# Annotations merged into the metadata.annotations of every resource this chart
# renders. Per-resource annotation blocks (serviceAccount.annotations,
# ingress.annotations, gateway.annotations, service.annotations, podAnnotations)
# take precedence on key conflicts. Note: common metadata is intentionally NOT
# part of the pod config checksum, so changing it does not roll pods.
commonAnnotations: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}

replicaCount: 1

service:
  type: ClusterIP
  port: 80
  # Extra labels/annotations for the Service only (merged over commonLabels /
  # commonAnnotations). Use annotations for cloud load-balancer controls etc.
  labels: {}
  annotations: {}

# Metrics listener. When enabled, the chart renders config.metricsPort =
# metrics.port, which makes the app start a SEPARATE metrics listener and move
# /metrics off the main port. It also adds a dedicated container port and a
# `<fullname>-metrics` Service, plus an optional ServiceMonitor.
# READOUT_* env does not override metricsPort, so this rendered file value is
# the single source of truth for the metrics port.
metrics:
  enabled: false
  # Container/listener port the app binds metrics on. Rendered into the app
  # config as metricsPort. Setting config.metricsPort directly to a DIFFERENT
  # value (or while metrics is disabled) is a template error.
  port: 9090
  # The metrics Service. targetPort always tracks the `metrics` container port.
  service:
    port: 9090
    # Extra labels/annotations for the metrics Service only (merged over
    # commonLabels / commonAnnotations).
    annotations: {}
    labels: {}
  # ServiceMonitor (monitoring.coreos.com/v1) for Prometheus Operator. Off by
  # default: it requires the third-party CRD. The ServiceMonitor selects the
  # metrics Service by the stable app.kubernetes.io/name + /instance labels plus
  # any metrics.service.labels, and scrapes the named `metrics` endpoint port --
  # so labels added under metrics.service.labels also become selector keys.
  serviceMonitor:
    enabled: false
    # Extra labels on the ServiceMonitor object itself (e.g. a `release` label
    # so a Prometheus Operator instance picks it up).
    labels: {}
    # Scrape interval and timeout. Empty string omits the field, letting the
    # operator/Prometheus default apply.
    interval: 30s
    scrapeTimeout: ""

# Expose readout through a Kubernetes Ingress (networking.k8s.io/v1). The
# backend always targets this chart's Service on service.port above.
ingress:
  enabled: false
  # IngressClass to use. Leave empty to let the cluster pick its default class.
  className: ""
  annotations: {}
  # At least one host is required when enabled. A host entry with no `paths`
  # gets a single default path "/" with pathType Prefix.
  hosts: []
    # - host: readout.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  # Passed through verbatim into spec.tls.
  tls: []
    # - hosts:
    #     - readout.example.com
    #   secretName: readout-tls

# Expose readout through Gateway API by attaching an HTTPRoute to an existing
# Gateway. This chart never creates a Gateway or GatewayClass -- those are
# platform infrastructure. backendRefs always target this chart's Service on
# service.port above.
gateway:
  enabled: false
  # HTTPRoute API version. Override to gateway.networking.k8s.io/v1beta1 on
  # clusters pinned to the older API.
  apiVersion: gateway.networking.k8s.io/v1
  # Required when enabled: the Gateway(s) this route attaches to. An HTTPRoute
  # with no parentRefs is invalid, so the template fails fast when this is empty.
  parentRefs: []
    # - name: public-gateway
    #   namespace: gateway-system
    #   sectionName: https
  # Optional. Omit to attach to all of the parent Gateway's listener hostnames.
  hostnames: []
    # - readout.example.com
  annotations: {}
  # Optional. Write rules only to add matches or filters. When empty, a single
  # catch-all rule routes everything to this chart's Service.
  rules: []
    # - matches:
    #     - path:
    #         type: PathPrefix
    #         value: /
    #   backendRefs:
    #     - name: readout
    #       port: 80

# readout configuration. This whole block is serialized verbatim into a
# ConfigMap as readout.yaml and mounted at /etc/readout/readout.yaml; the
# container runs with --config /etc/readout/readout.yaml. The schema matches
# readout.yaml. Secrets are NOT placed here -- they come from READOUT_* env
# (see env / envFrom below), which override the file at startup.
config:
  port: 8080
  excludeNamespaces:
    - kube-.*
  showContainerLogs: false
  includeSecrets: false
  auth:
    mode: none   # safe default: no identity trusted. Set behind a real auth layer.
    # mode: headers
    # DANGER: header-trust auth is ONLY safe behind a reverse proxy that strips and
    # re-sets X-Forwarded-User/Email/Groups. Without such a proxy any client can
    # impersonate any user. Enable only when such a proxy is in front.
    # trustedHeaders:
    #   user: X-Forwarded-User
    #   email: X-Forwarded-Email
    #   groups: X-Forwarded-Groups

# Typed secret wiring. Point these at Secrets you already created (the chart
# never creates Secret objects and holds no secret values itself) and it renders
# the matching READOUT_* env vars via secretKeyRef. Leave existingSecret empty to
# skip; then nothing is wired and you can do it by hand through env / envFrom.
auth:
  # Session signing secret -> READOUT_SESSION_SECRET.
  sessionSecret:
    # Name of an existing Secret. Empty disables this wiring.
    existingSecret: ""
    # Key within that Secret holding the session secret value.
    key: session-secret
  # OIDC client credentials -> READOUT_OIDC_CLIENT_ID + READOUT_OIDC_CLIENT_SECRET.
  oidc:
    # Name of an existing Secret. Empty disables this wiring.
    existingSecret: ""
    # Keys within that Secret for the client id and client secret.
    clientIdKey: client-id
    clientSecretKey: client-secret

# READOUT_* secret environment. `env` adds literal name/value pairs;
# `envFrom` references existing Secrets/ConfigMaps (e.g. a Secret holding
# READOUT_SESSION_SECRET / READOUT_OIDC_CLIENT_SECRET). Secrets never go in the
# ConfigMap above. The typed `auth` entries above are rendered FIRST, then these
# `env` entries; because Kubernetes lets the last entry with a given name win, an
# `env` entry here overrides a typed entry of the same name.
env: []
#  - name: READOUT_SESSION_SECRET
#    valueFrom:
#      secretKeyRef:
#        name: readout
#        key: session-secret
envFrom: []
#  - secretRef:
#      name: readout

resources: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Annotations/labels added to the pod template only (in addition to the chart's
# standard pod labels and commonLabels/commonAnnotations).
podAnnotations: {}
podLabels: {}

# Standard scheduling and placement pass-throughs. All rendered verbatim only
# when set, so the default render carries none of them.
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""

# Extra volumes and volume mounts for the readout container. extraVolumeMounts
# are appended to the readout container; extraVolumes to the pod.
extraVolumes: []
# - name: cache
#   emptyDir: {}
extraVolumeMounts: []
# - name: cache
#   mountPath: /var/cache/readout

# Extra init containers and sidecar containers, rendered verbatim into the pod.
initContainers: []
extraContainers: []

# PodDisruptionBudget for the readout pods. minAvailable and maxUnavailable are
# mutually exclusive -- set exactly one; Kubernetes rejects a PDB with both. The
# selector always targets this chart's pods.
podDisruptionBudget:
  enabled: false
  minAvailable: ""
  maxUnavailable: ""

# Escape hatch for arbitrary Helm-owned objects this chart does not model
# (platform CRs, extra Secrets, etc.). Each list entry is one YAML map for a
# single object -- multi-document strings are not supported. Entries are emitted
# verbatim (no chart labels or annotations are injected, so immutable fields are
# never mutated), but string values are run through tpl with the chart root
# context, so they may embed expressions such as {{ .Release.Name }} or
# {{ include "readout.fullname" $ }}. These objects share the release lifecycle
# and are deleted when the release is uninstalled.
extraObjects: []
# - apiVersion: v1
#   kind: Secret
#   metadata:
#     name: '{{ include "readout.fullname" $ }}-extra'
#   stringData:
#     key: value
