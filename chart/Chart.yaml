  artifacthub.io/changes: |
    - kind: added
      description: "Touch-reachable search: a topbar search button below 760px opens the command palette where the keyboard shortcut is unavailable"
    - kind: fixed
      description: "Native controls follow the active theme (color-scheme): scrollbars and select popups render dark in the dark theme; text selection is now legibly tinted; the forced horizontal scrollbar on classic-scrollbar platforms is gone"
    - kind: fixed
      description: "YAML line-anchor highlight uses the accent treatment instead of a hardcoded yellow that broke on the dark theme"
    - kind: changed
      description: "UI polish: one focus-ring dialect across filter and select inputs, a shared pop-tier corner radius, thin themed scrollbars on inner scrollers, and buttons that no longer wrap"
