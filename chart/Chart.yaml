apiVersion: v2
name: readout
description: Strictly read-only Kubernetes web viewer in Go
type: application
version: 0.9.0
appVersion: 0.9.0
kubeVersion: ">=1.25.0-0"
home: https://github.com/kbelokon/readout
sources:
  - https://github.com/kbelokon/readout
icon: https://raw.githubusercontent.com/kbelokon/readout/main/brand/readout-icon.png
keywords:
  - kubernetes
  - read-only
  - viewer
  - dashboard
  - rbac
  - oidc
maintainers:
  - name: Kirill Belokon
    email: kb@kbelokon.com
    url: https://github.com/kbelokon
annotations:
  artifacthub.io/license: GPL-3.0-only
  artifacthub.io/links: |
    - name: source
      url: https://github.com/kbelokon/readout
    - name: chart
      url: https://github.com/kbelokon/readout/tree/main/chart
  artifacthub.io/images: |
    - name: readout
      image: ghcr.io/kbelokon/readout:0.9.0
  artifacthub.io/changes: |
    - kind: security
      description: "Security audit closure: source-aware exec credential-plugin allowlist, fail-closed authorization hook with token minimization, cluster server-URL SSRF validation (link-local/metadata rejected), same-origin CSRF guard, security headers (Referrer-Policy/Permissions-Policy/COOP/gated HSTS), host allowlist, and bounded API reads"
    - kind: changed
      description: "RBAC preset defaults to restricted (read-only on a curated resource set); wildcard is now an explicit opt-in"
    - kind: changed
      description: "No blocking gates: no-auth network exposure and multi-replica OIDC without a shared session secret install and warn loudly in NOTES instead of failing; the unsafe.* override values are removed and the chart never refuses to render over a posture"
    - kind: changed
      description: "Header-auth identity is honored only when the TCP peer falls inside auth.trustedHeaders.trustedProxyCidrs; insecureSkipTLSVerify now logs a per-cluster startup warning"
    - kind: added
      description: "Opt-in NetworkPolicy, default resource requests/limits, a multi-cluster kubeconfig example, SHA-pinned CI actions, and digest-pinned base/test images"
