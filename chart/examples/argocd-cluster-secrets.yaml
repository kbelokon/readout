# argocd-cluster-secrets.yaml -- discover clusters from Argo CD cluster Secrets,
# with least-privilege RBAC.
#
# Deploys: readout reading Argo CD's cluster Secrets from the local cluster (the
# in-cluster ServiceAccount) and turning each into a connection. Uses the
# restricted RBAC preset, where the granted read scope is DERIVED from
# .Values.config -- this is the case where that derivation visibly matters: the
# restricted preset renders a namespaced Role + RoleBinding granting secrets read
# in the argocd namespace, instead of the wildcard cluster-wide secrets read.
#
# Cluster prerequisites:
#   - Argo CD installed with cluster Secrets labelled
#     argocd.argoproj.io/secret-type=cluster
#   - the "argocd" namespace must already exist (the chart does not create it)
#   - no Secrets are created by this example; readout reads Argo's existing
#     cluster Secrets through the granted Role
#
# After install:
#   kubectl get role,rolebinding -n argocd -l app.kubernetes.io/name=readout
#   kubectl port-forward svc/readout 8080:80   # the cluster picker lists Argo's clusters
#
# Not exposed externally and auth.mode stays none, so no gate fires.
rbac:
  preset: restricted

config:
  argoCD:
    # Empty hostCluster means the in-cluster ServiceAccount, which is what makes
    # the restricted preset render the namespaced secrets-read Role below.
    hostCluster: ""
    namespace: argocd
