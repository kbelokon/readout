# oidc-existing-secret.yaml -- the typed OIDC recipe with pre-created Secrets.
#
# Deploys: readout in OIDC login mode behind an Ingress, with the session signing
# secret and the OIDC client credentials wired from Secrets you already created.
# This is the recommended way to run readout exposed to real users.
#
# Cluster prerequisites (the chart NEVER creates Secrets -- create both first):
#   kubectl create secret generic readout-session \
#     --from-literal=session-secret="$(openssl rand -hex 32)"
#   kubectl create secret generic readout-oidc \
#     --from-literal=client-id=YOUR_OIDC_CLIENT_ID \
#     --from-literal=client-secret=YOUR_OIDC_CLIENT_SECRET
#   - an ingress-nginx controller serving the "nginx" IngressClass
#   - DNS for readout.example.com pointed at the controller
#   - an OIDC provider with this app registered; its redirect/callback URL is
#     publicUrl + /oauth2/callback (https://readout.example.com/oauth2/callback)
#
# After install:
#   kubectl get pods -l app.kubernetes.io/name=readout
#   open https://readout.example.com/   # you should be redirected to the IdP
#
# No unsafe.* acknowledgement is needed: auth.mode is oidc, so the no-auth gate
# does not fire, and the session secret is wired through chart values, so the
# multi-replica session gate is satisfied.
replicaCount: 2

config:
  # Externally-visible origin. Base for the OIDC redirect URL
  # (publicUrl + /oauth2/callback). Must be scheme + host only, no path.
  publicUrl: https://readout.example.com
  auth:
    mode: oidc
    oidc:
      issuerUrl: https://idp.example.com/

auth:
  # Session signing secret -> READOUT_SESSION_SECRET (from the readout-session
  # Secret created above). Sharing it across replicas keeps OIDC login affinity.
  sessionSecret:
    existingSecret: readout-session
    key: session-secret
  # OIDC client credentials -> READOUT_OIDC_CLIENT_ID + READOUT_OIDC_CLIENT_SECRET
  # (from the readout-oidc Secret created above).
  oidc:
    existingSecret: readout-oidc
    clientIdKey: client-id
    clientSecretKey: client-secret

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: readout.example.com
      paths:
        - path: /
          pathType: Prefix
