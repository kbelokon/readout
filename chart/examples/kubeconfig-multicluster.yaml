# kubeconfig-multicluster.yaml -- point readout at a multi-context kubeconfig that
# your CI/Vault pipeline renders into a Secret, mounted read-only into the pod.
#
# This is the maintainer's primary real-world pattern: one kubeconfig holding many
# clusters' contexts (each with its own server + credential), built outside the
# chart (Vault template, sealed-secret, External Secrets, sops, ...) and handed to
# readout as a file. readout's kubeconfig source then turns EVERY context in the
# file into a cluster (or only the named ones via config.kubeconfigContexts).
#
# Nothing here needs new chart scaffolding: it is the chart's generic extraVolumes
# + extraVolumeMounts wiring (mount the Secret as a file) plus the config
# passthrough (config.kubeconfigPath names the mounted file). The Secret below is a
# PLACEHOLDER shipped via extraObjects so the example renders and validates
# end-to-end; in production you do NOT commit the kubeconfig -- you let your secrets
# pipeline own that Secret and drop the extraObjects block, keeping only the mount
# and config.kubeconfigPath.
#
# Cluster prerequisites:
#   - the rendered kubeconfig uses static tokens / client certs / CA data, OR an
#     exec credential plugin whose command is on the kubeconfig source's default
#     allowlist (aws, aws-iam-authenticator, gke-gcloud-auth-plugin, kubelogin,
#     kubectl-oidc_login). The kubeconfig source is operator-owned, so those common
#     cloud plugins are permitted out of the box; an exec plugin's BINARY must be on
#     PATH in readout's image (see the chart's exec-plugin note / backlog B-002).
#   - server URLs must be reachable from readout's pod (no loopback/metadata hosts).
#
# After install:
#   kubectl get secret readout-kubeconfig
#   kubectl port-forward svc/readout 8080:80   # the cluster picker lists every context
#
# Not exposed externally and auth.mode stays none, so no gate fires. Put real auth
# in front before exposing (see oidc-existing-secret.yaml).

config:
  # The mounted kubeconfig file. readout loads ALL contexts in it; narrow to named
  # ones by setting kubeconfigContexts.
  kubeconfigPath: /etc/readout/kubeconfig/config
  # Empty (or omitted) = every context becomes a cluster. List names to restrict:
  # kubeconfigContexts:
  #   - prod-eks
  #   - staging-gke

# Mount the kubeconfig Secret read-only at the path config.kubeconfigPath points at.
extraVolumes:
  - name: kubeconfig
    secret:
      secretName: readout-kubeconfig
      defaultMode: 0400
extraVolumeMounts:
  - name: kubeconfig
    mountPath: /etc/readout/kubeconfig
    readOnly: true

# PLACEHOLDER Secret so this example renders and validates standalone. In
# production, DELETE this block and let your CI/Vault pipeline own the Secret named
# in extraVolumes[].secret.secretName above.
extraObjects:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: readout-kubeconfig
    type: Opaque
    stringData:
      config: |
        apiVersion: v1
        kind: Config
        clusters:
          - name: prod-eks
            cluster:
              server: https://prod-eks.example.com
              certificate-authority-data: REPLACE_WITH_BASE64_CA
          - name: staging-gke
            cluster:
              server: https://staging-gke.example.com
              certificate-authority-data: REPLACE_WITH_BASE64_CA
        users:
          - name: prod-eks
            user:
              # Static token rendered by your pipeline, OR an exec block using an
              # allowlisted cloud plugin (aws/gke-gcloud-auth-plugin/...).
              token: REPLACE_WITH_TOKEN
          - name: staging-gke
            user:
              token: REPLACE_WITH_TOKEN
        contexts:
          - name: prod-eks
            context:
              cluster: prod-eks
              user: prod-eks
          - name: staging-gke
            context:
              cluster: staging-gke
              user: staging-gke
