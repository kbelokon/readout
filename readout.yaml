# readout configuration.
#
# Run with: readout --config readout.yaml
#
# Bootstrap flags (--config, --port, --debug, --version) are the only flags;
# everything else is configured here. Secrets are NOT written in this file --
# they come from the environment (see "Secrets" at the bottom). Environment
# values override the file.
#
# This file is parsed with sigs.k8s.io/yaml, which routes YAML through JSON:
# anchors/merge keys are not supported and comments are not round-tripped, but
# every standard YAML scalar/list/map form below works. Unknown keys are
# rejected, so a typo fails fast at startup.

# TCP port to listen on. The --port flag overrides this.
port: 8080

# Bind host for BOTH the app and metrics listeners (the port stays per-listener).
# Leave empty to bind all interfaces (":port"). SAFE DEFAULT: when this is empty
# AND auth.mode is "none", readout binds loopback (127.0.0.1) instead, so a
# no-auth instance does not serve unauthenticated cluster data on every
# interface. An explicit value always wins -- set it (e.g. "0.0.0.0") to bind a
# network address; under no-auth that logs a loud startup warning but never
# refuses to start. When bound to loopback under no-auth, request Host headers
# must be a loopback name (localhost / 127.0.0.1 / [::1]) -- a DNS-rebinding
# guard that never blocks your own local access.
listenAddress: ""

# Optional separate Prometheus metrics listener. When 0, /metrics is served on
# the main port as a public endpoint. When non-zero, /metrics is served only on
# this port and is disabled on the main app listener.
metricsPort: 0

# Externally-visible origin readout is reached at (scheme + host, no path).
# When set, it is the base for the OIDC redirect URL (publicUrl + /oauth2/callback)
# in place of reconstructing it from per-request X-Forwarded headers, and it
# satisfies the OIDC redirect requirement without an explicit auth.oidc.redirectUrl.
# Must be an origin only -- readout serves on its own host root, so a path
# (https://example.com/readout) is a startup error. A single trailing slash is
# accepted and normalized away.
publicUrl: ""

# Namespace allow/deny. Regular expressions (RE2). Exclude wins over include;
# an empty include list means "all namespaces". Cluster-scoped objects are
# never excluded by namespace.
includeNamespaces: []
excludeNamespaces:
  - kube-.*

# Statically configured cluster connections. Each entry uses kubeconfig field
# names/semantics and maps 1:1 onto a kubeconfig cluster+user, so readout hands
# the connection to client-go and lets it build the TLS/auth exactly as kubectl
# would -- nothing is hand-rolled. Names must be unique (a duplicate name is a
# startup error). Omit this block entirely to discover clusters from a kubeconfig
# instead (kubeconfigPath / kubeconfigContexts below); the two can also coexist.
#
# Per-cluster fields (all optional except `name`):
#   name                     stable identifier used in URLs and the cluster picker
#   server                   apiserver URL (https://host:port)
#   certificateAuthority     path to a PEM CA bundle file that signs the apiserver
#   certificateAuthorityData inline CA bundle, base64-encoded (kubeconfig's
#                            certificate-authority-data); mutually exclusive with
#                            certificateAuthority
#   insecureSkipTlsVerify    skip apiserver certificate verification (do not use
#                            in production -- prefer pinning the CA above)
#   tlsServerName            override the SNI / cert hostname checked at handshake
#                            (when `server` is an IP or differs from the cert SAN)
#   token                    inline bearer token (a static ServiceAccount token).
#                            Prefer tokenFile for anything that rotates -- an
#                            inline token shadows tokenFile and disables refresh.
#   tokenFile                path to a bearer-token file; client-go re-reads it on
#                            rotation (e.g. a projected ServiceAccount token)
#   clientCertificate        path to a client cert PEM (mTLS)
#   clientCertificateData    inline client cert, base64-encoded
#   clientKey                path to the client key PEM
#   clientKeyData            inline client key, base64-encoded
#   impersonate              act-as identity for THIS cluster's base connection
#                            {user, groups, uid}. Note: when per-request token
#                            passthrough fires (clusterAuthUseSessionToken below),
#                            impersonate is dropped for that request so it is
#                            always evaluated as the viewer, never the act-as user.
#
# An `exec`-style credential plugin is also a supported auth field, but readout's
# image does NOT bundle the plugin binaries (aws / gke-gcloud-auth-plugin /
# kubelogin) -- see the README "Connecting to clusters" section.
clusters:
  - name: prod
    server: https://10.0.0.1:6443
    # Inline CA (base64) instead of a file path, with an explicit server name
    # because `server` is an IP that won't match the cert SAN otherwise.
    certificateAuthorityData: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCi4uLiBiYXNlNjQtZW5jb2RlZCBDQSBjZXJ0IC4uLgotLS0tLUVORCBDRVJUSUZJQ0FURS0tLS0tCg==
    tlsServerName: kubernetes.default.svc
    # Rotating ServiceAccount token read from a file (refreshes on rotation).
    tokenFile: /var/run/secrets/readout/prod-token
    # Static act-as identity for this cluster's base connection. Dropped on
    # per-request token passthrough (see clusterAuthUseSessionToken).
    impersonate:
      user: system:serviceaccount:readout:viewer
      groups:
        - system:authenticated

# kubeconfig discovery (used when no static clusters are listed, or alongside
# them). kubeconfigPath defaults to the usual kubeconfig resolution when empty;
# kubeconfigContexts narrows discovery to the named contexts (empty = all).
kubeconfigPath: ""
kubeconfigContexts: []

# Per-request cluster auth: forward the viewer's frontend session token to the
# apiserver so each request is evaluated under the viewer's own RBAC. When this
# fires it overrides a connection's static token and impersonate for that request.
clusterAuthUseSessionToken: false

# Argo CD cluster-Secret discovery (optional). When present, readout lists the
# Secrets Argo CD labels `argocd.argoproj.io/secret-type=cluster` in a host
# cluster and turns each into a connection (the nested data.config: server, TLS,
# bearerToken/exec). A host that is down or RBAC-forbidden is surfaced as a broken
# source but never blanks the other clusters. Omit the whole block to disable it.
#   hostCluster: name of a cluster above to list the Secrets FROM ("" = the
#                in-cluster ServiceAccount where readout runs)
#   namespace:   where Argo's cluster Secrets live (default: argocd)
# argoCD:
#   hostCluster: ""
#   namespace: argocd

# Behavior toggles.
showContainerLogs: false   # enable the container-logs tab
noAccessLogs: false        # silence per-request access logging
includeSecrets: false      # re-admit the Secret resource type (values stay masked)

# Custom HTML partials / static assets (operator overrides).
templatesPath: ""
staticAssetsPath: ""

# External links rendered next to objects, label values, and timestamps.
# Keyed by resource-type plural (objectLinks/timestampLinks) or label name
# (labelLinks). Each link is {href, icon, title}; icon/title are optional and
# default to a generic external-link glyph. href templates expand {name},
# {namespace}, {value}, {timestamp} at render time.
objectLinks:
  pods:
    - href: https://grafana.example/d/pods?var-pod={name}&var-namespace={namespace}
      icon: chart-line
      title: Pod dashboard
labelLinks:
  team:
    - href: https://wiki.example/teams/{value}
      title: Team page
timestampLinks:
  events:
    - href: https://logs.example/?time={timestamp}
      icon: clock
      title: Logs at this time

# Extra columns appended to resource tables, keyed by resource-type plural.
#
# Custom columns are kubectl-style JSONPath expressions ("NAME:path"), matching
# `kubectl get -o custom-columns`. A bare path (spec.containers[*].image) and a
# braced template ({.spec.containers[*].image}) are both accepted. Multi-value
# results render space-joined.
labelColumns:
  pods: app
hiddenColumns:
  pods: ""
customColumns:
  pods: "Image:{.spec.containers[*].image}"
  nodes: "Zone:.metadata.labels.topology\\.kubernetes\\.io/zone"

# Pin a preferred apiVersion per resource-type plural (e.g. when several
# versions are served and the newest is not the one you want listed).
preferredApiVersions:
  ingresses: networking.k8s.io/v1

# Per-resource icon overrides (Tier 3 of the icon system). Every navigable
# resource already gets an icon automatically -- built-in kinds use a curated
# glyph, known CRD families a tinted family glyph, and any other CRD a
# deterministic 2-letter monogram tile coloured by its API group. Use this
# block ONLY to pin a specific icon for a {kind, group} pair. Each entry is a
# typed object keyed by kind+group (NOT by plural):
#
#   icon forms:
#     lucide:<name> or a bare name   -> a bundled glyph (see the icon set)
#     emoji:🐙                        -> an emoji
#     /icons/foo.svg  (or foo.png)    -> a LOCAL asset served by readout
#
#   Remote http(s):// image URLs are DROPPED: the Content-Security-Policy
#   restricts images to 'self' (a remote <img> would silently fail to load),
#   so such an override falls back to the automatically-resolved glyph.
resources: []
  # - kind: Cluster
  #   group: postgresql.cnpg.io
  #   icon: /icons/postgres.svg
  # - kind: Rollout
  #   group: argoproj.io
  #   icon: "emoji:🐙"

# Theme: the default and the operator-allowed options.
defaultTheme: dark
themeOptions:
  - dark
  - light

# Cross-links to other readout instances (name + base URL).
externalClusters: []

# Sidebar navigation. ORDERED: groups render top-to-bottom in the order written
# here (not alphabetically). Each group is a heading label plus the resource
# types listed under it. Omit this block to use the built-in default layout.
sidebar:
  - label: Cluster Resources
    resources:
      - namespaces
      - nodes
      - persistentvolumes
  - label: Controllers
    resources:
      - deployments
      - cronjobs
      - jobs
      - daemonsets
      - statefulsets
  - label: Pod Management
    resources:
      - ingresses
      - services
      - pods
      - configmaps

# Multi-resource search.
search:
  defaultResourceTypes:
    - pods
    - deployments
    - services
  offeredResourceTypes:
    - pods
    - deployments
    - services
    - nodes
    - configmaps
  maxConcurrency: 100

# Session-signing secret read from a mounted file (an alternative to the
# READOUT_SESSION_SECRET env var; the env var wins when both are set). The secret
# itself is never written inline in this file -- only a path to it. Leave empty
# to rely on the env var alone.
sessionSecretFile: ""

# Authentication.
#   mode: none | headers | oidc
#   headers: trust reverse-proxy identity headers
#   oidc:    OpenID Connect login (client secret comes from the environment)
#
# OIDC requires a callback (redirect) URL: set either auth.oidc.redirectUrl
# (or READOUT_OIDC_REDIRECT_URL) or the top-level publicUrl above. Setting OIDC
# fields here while leaving mode at "none" is a startup error -- set mode: oidc.
auth:
  mode: none
  trustedHeaders:
    user: X-Forwarded-User
    email: X-Forwarded-Email
    groups: X-Forwarded-Groups
  oidc:
    issuerUrl: ""
    clientId: ""
    # clientIdFile / clientSecretFile read the value from a mounted file
    # (alternative to the READOUT_OIDC_CLIENT_* env vars).
    clientIdFile: ""
    clientSecretFile: ""
    redirectUrl: ""
    authorizeUrl: ""
    tokenUrl: ""
    scope: ""

# External JSON HTTP hooks (replace the upstream in-process coroutine hooks).
hooks:
  authorizationUrl: ""
  resourcePrerenderUrl: ""

# Secrets come from the environment, never this file. Environment overrides the
# file for these:
#
#   READOUT_SESSION_SECRET                signing key for session cookies
#   READOUT_OIDC_CLIENT_ID                OIDC client id
#   READOUT_OIDC_CLIENT_SECRET            OIDC client secret
#   READOUT_OIDC_ISSUER_URL               OIDC issuer URL
#   READOUT_OIDC_REDIRECT_URL             OIDC redirect URL
#   READOUT_AUTHORIZATION_HOOK_URL        authorization hook URL
#   READOUT_RESOURCE_PRERENDER_HOOK_URL   resource-prerender hook URL
